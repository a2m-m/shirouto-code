# =============================================================================
# project_config.yml — Instance 設定の唯一の入口
# =============================================================================
#
# このファイルは 02_OS_Template_Spec.md Section 4.1 に基づく。
# CI と os_scripts/run はこのファイルの commands を読んで実行する。
# OS Template Repo ではこのファイルをプレースホルダ付きの雛形として保持する。
#
# 運用ルール（Section 4.1.2）:
#   - commands.lint と commands.test は必ず埋めること（空は禁止）
#   - typecheck がない言語は空でOK（.ai-context.md に理由を記載）
#   - runtime.mode=docker を推奨（言語差分吸収が最も安定）
# =============================================================================

schema_version: "1"

# ---------------------------------------------------------------------------
# project: プロジェクト識別情報
# ---------------------------------------------------------------------------
project:
  name: "シロートコード"
  owner: "a2m-m"
  description: "プロジェクトの説明"

# ---------------------------------------------------------------------------
# runtime: 実行環境の設定
# ---------------------------------------------------------------------------
runtime:
  mode: "host"                        # "docker" | "host"
  docker_image: ""                    # mode=docker の場合に指定
  host_setup_steps: []                # セットアップは ci.yml の extension-build ジョブで実施

# ---------------------------------------------------------------------------
# commands: os_scripts/run が実行するコマンド定義
# ---------------------------------------------------------------------------
# CI とローカル実行はこのセクションのコマンドを叩くことで統一される。
# lint と test は必須。空のままだと os_scripts/run doctor で警告、CI では失敗扱いとなる。
# ---------------------------------------------------------------------------
commands:
  format: ""                          # optional: フォーマッタ (例: "black ." / "prettier --write .")
  lint: "npm run lint"                 # ESLint による TypeScript 静的解析
  typecheck: ""                       # optional: 型チェック (例: "mypy ." / "tsc --noEmit")。未使用なら空でOK
  test: "npm test"                     # jest による TypeScript ユニットテスト
  build: "npm run compile"            # 拡張機能 TypeScript コンパイル
  ci: ""                              # optional: 明示したい場合。空なら run が lint → typecheck → test を順に実行

# ---------------------------------------------------------------------------
# features: 機能の ON/OFF
# ---------------------------------------------------------------------------
features:
  ci: true                            # CI自動実行
  secret_scan: true                   # シークレット検知
  dependency_scan: true               # 依存パッケージ脆弱性スキャン
  guardrail: false                    # AI 監査レビュー（PRコメント）
  # lcg を有効化する場合はリポジトリシークレットに GEMINI_API_KEY を必ず設定してください
  lcg: false                          # Learning Content Generator（段階導入のためデフォルト OFF）

# ---------------------------------------------------------------------------
# ai: LLM プロバイダ設定（guardrail / lcg で使用）
# ---------------------------------------------------------------------------
ai:
  provider: gemini              # "gemini" | "openai"（現在 gemini のみ実装）
  model: gemini-2.5-flash       # プロバイダごとのモデル名

# ---------------------------------------------------------------------------
# security: Claude Code フックによるアクセス制御
# ---------------------------------------------------------------------------
security:
  # .claude/hooks/guardrail.py が読み込む機密ファイル遮断パターン（glob 形式）
  # 未定義またはリスト空の場合はスクリプト組み込みのデフォルトパターンが使われる
  blocked_file_patterns:
    - ".env"
    - ".env.*"
    - "**/.env"
    - "**/.env.*"
    - "credentials*"
    - "**/credentials*"
    - "secret*"
    - "**/secret*"
    - "**/.secret*"
    - "**/secrets.json"
    - "**/secrets.yaml"

# ---------------------------------------------------------------------------
# policy: プロジェクトポリシー
# ---------------------------------------------------------------------------
policy:
  allow_skip_typecheck: true          # true の場合、typecheck 空でもOK（.ai-context.md に理由を記載）
  max_diff_warning: 1200              # PR の行数目安（超過で警告）
  max_file_warning: 30                # PR のファイル数目安（超過で警告）

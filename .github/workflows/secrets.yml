name: Secrets Scan

on:
  pull_request:

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check Secrets Scan Enabled
        id: check-secrets
        run: |
          if [ -f "project_config.yml" ]; then
            ENABLED=$(python3 -c '
          import sys, re
          for line in open("project_config.yml"):
              m = re.match(r"^\s+secret_scan:\s*(true|false)", line)
              if m:
                  print(m.group(1).lower())
                  sys.exit(0)
          print("true")')
          else
            ENABLED="true"
          fi
          echo "enabled=$ENABLED" >> $GITHUB_OUTPUT

      - name: Run Gitleaks
        if: steps.check-secrets.outputs.enabled == 'true'
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # NOTE: private リポジトリで使用する場合は GITLEAKS_LICENSE シークレットが追加で必要になる場合があります。
          # 参照: https://github.com/gitleaks/gitleaks-action#environment-variables

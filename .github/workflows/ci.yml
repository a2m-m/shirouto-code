name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  os-self-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Python dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r requirements.txt

      - name: Run OS self-tests
        run: python3 -m unittest discover -s os_scripts -p '*test.py' -v

  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Python dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r requirements.txt

      - name: Check CI Enabled
        id: check-ci
        run: |
          if [ -f "project_config.yml" ]; then
            ENABLED=$(python3 -c '
          import sys, re
          for line in open("project_config.yml"):
              m = re.match(r"^\s+ci:\s*(true|false)", line)
              if m:
                  print(m.group(1).lower())
                  sys.exit(0)
          print("true")')
          else
            ENABLED="true"
          fi
          echo "enabled=$ENABLED" >> $GITHUB_OUTPUT

      - name: Run Doctor
        if: steps.check-ci.outputs.enabled == 'true'
        run: ./os_scripts/run doctor

      - name: Run CI
        if: steps.check-ci.outputs.enabled == 'true'
        run: ./os_scripts/run ci

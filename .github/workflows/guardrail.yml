name: Guardrail CI

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write
  contents: read

jobs:
  guardrail:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Check if guardrail is enabled
        id: check
        run: |
          if awk '/^features:/ {in_features=1} /^policy:/ {in_features=0} in_features && /^[[:space:]]*guardrail:[[:space:]]*true/ {found=1} END {exit !found}' project_config.yml; then
            echo "enabled=true" >> $GITHUB_OUTPUT
            echo "Guardrail is enabled in project_config.yml."
          else
            echo "enabled=false" >> $GITHUB_OUTPUT
            echo "Guardrail is disabled in project_config.yml. Skipping."
          fi

      - name: Install Python dependencies
        if: steps.check.outputs.enabled == 'true'
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r requirements.txt

      - name: Prepare Guardrail Execution
        if: steps.check.outputs.enabled == 'true'
        id: prepare-ai
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          IS_FORK: ${{ github.event.pull_request.head.repo.fork }}
        run: |
          if [ -n "${GEMINI_API_KEY}" ]; then
            echo "ready=true" >> $GITHUB_OUTPUT
          elif [ "${IS_FORK}" = "true" ]; then
            echo "::notice::GEMINI_API_KEY is unavailable for forked pull requests. Skipping Guardrail."
            echo "ready=false" >> $GITHUB_OUTPUT
          else
            echo "::error::GEMINI_API_KEY is required when features.guardrail is true."
            exit 1
          fi

      - name: Run Guardrail
        if: steps.check.outputs.enabled == 'true' && steps.prepare-ai.outputs.ready == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python3 os_scripts/guardrail
